<div id="srodek">   <div id="timer">Jak długo jesteśmy razem: 00d 00h 00m 00s</div>

<script>
    const startDate = new Date('2023-11-07T17:50:00');

    function updateTimer() {
        const now = new Date(); 
        const diff = now - startDate; 

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        const timeString = `Jak długo jesteśmy razem: ${days} dni ${hours} godzin ${minutes} minut  ${seconds} sekund`;

        document.getElementById('timer').innerText = timeString;
    }
    updateTimer();
    setInterval(updateTimer, 1000);
</script>
